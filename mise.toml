[tools]
uv = "latest"

[tasks.setup]
run = "uv sync"
description = "Install all dependencies into .venv"

[tasks.test-unit]
run = "uv run pytest tests/ -v --cov=models --cov-report=term-missing -m 'not e2e'"
description = "Run unit tests with coverage"

[tasks.format]
run = "uv run ruff format *.py models/ tests/ web/"
description = "Format code with ruff"

[tasks.format-check]
run = "uv run ruff format --check *.py models/ tests/ web/"
description = "Check code formatting"

[tasks.lint]
run = "uv run ruff check *.py models/ tests/ web/"
description = "Lint with ruff"

[tasks.lint-fix]
run = "uv run ruff check --fix *.py models/ tests/ web/"
description = "Fix lint issues with ruff"

[tasks.validate]
run = "uv run python validate_yaml.py"
description = "Validate vehicle YAML files against schema"

[tasks.test-web]
run = "uv run pytest tests/e2e/ -v"
description = "Run web browser tests with Playwright"

[tasks.playwright-install]
run = "uv run playwright install chromium"
description = "Install Playwright browser binaries"

[tasks.test]
depends = ["format-check", "lint", "validate", "test-unit", "test-web"]
description = "Run all CI checks"

[tasks.serve]
run = "uv run python web/app.py"
description = "Start the web server"
